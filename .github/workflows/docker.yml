name: Docker

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  # schedule:
  #   - cron: '25 16 * * *'
  workflow_call:
    inputs:
      is-cd:
        type: boolean
        required: false
        description: Whether to run the deployment job
        default: false
      environment:
        type: string
        required: false
        description: The target environment for deployment

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # This is used to complete the identity challenge
      # with sigstore/fulcio when running outside of PRs.
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Install the cosign tool except on PR
      # https://github.com/sigstore/cosign-installer
      - name: Install cosign
        if: ${{ inputs.is-cd }}
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 #v4.1.1
        with:
          cosign-release: "v2.2.4"

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        if: ${{ inputs.is-cd }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Setup .NET SDK with NuGet cache to preserve build cache
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      # Install Aspire CLI for container image publishing
      - name: Install Aspire CLI
        run: dotnet tool install -g Aspire.Cli --version 13.2.3

      # Build container image without pushing (PR validation only)
      - name: Build container image
        if: ${{ !inputs.is-cd }}
        run: |
          dotnet restore src/WebApi/MoneyGroup.WebApi.csproj
          dotnet publish src/WebApi/MoneyGroup.WebApi.csproj \
            /t:PublishContainer \
            --os linux --arch x64 \
            -c Release \
            --no-restore \
            -p:ContainerImageName=moneygroup-webapi

      # Build and push container image via Aspire CLI
      # https://aspire.dev/deployment/docker-compose/#push-images-with-the-aspire-cli
      - name: Build and push container image
        id: push
        if: ${{ inputs.is-cd }}
        env:
          REGISTRY_ENDPOINT: ${{ env.REGISTRY }}
          REGISTRY_REPOSITORY: ${{ github.repository }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
        run: |
          aspire do push \
            --apphost src/AppHost/MoneyGroup.AppHost.csproj \
            --non-interactive \
            --nologo

          # Compute manifest digest from the pushed image
          PRIMARY_IMAGE="${REGISTRY_ENDPOINT}/$(echo "${REGISTRY_REPOSITORY}" | tr '[:upper:]' '[:lower:]'):${IMAGE_TAG}"
          DIGEST=$(docker manifest inspect --verbose "${PRIMARY_IMAGE}" | jq -r '.Descriptor.digest')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "primary-image=${PRIMARY_IMAGE}" >> "$GITHUB_OUTPUT"

      # Create additional tags (e.g. sha tag) from the pushed manifest
      - name: Create additional image tags
        if: ${{ inputs.is-cd }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          PRIMARY_IMAGE: ${{ steps.push.outputs.primary-image }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          while IFS= read -r tag; do
            tag_lower=$(echo "$tag" | tr '[:upper:]' '[:lower:]')
            docker buildx imagetools create --tag "${tag_lower}" "${PRIMARY_IMAGE}@${DIGEST}"
          done <<< "${TAGS}"

      # Sign the resulting Docker image digest except on PRs.
      # This will only write to the public Rekor transparency log when the Docker
      # repository is public to avoid leaking data.  If you would like to publish
      # transparency data even for private images, pass --force to cosign below.
      # https://github.com/sigstore/cosign
      - name: Sign the published Docker image
        if: ${{ inputs.is-cd }}
        env:
          # https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        # This step uses the identity token to provision an ephemeral certificate
        # against the sigstore community Fulcio instance.
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.is-cd }}
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # 3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Deploy Azure Container App
        uses: azure/container-apps-deploy-action@8dff69dac3367c32ceb2690d8f13adbeab462703 # v2
        with:
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          registryUrl: ${{ env.REGISTRY }}
          imageToDeploy: ${{ steps.meta.outputs.tags }}
